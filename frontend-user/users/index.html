<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Quản lý Users - Optimized</title>
    <style>
        body { font-family: Arial; background: #f4f6f9; margin: 40px; }
        h1 { text-align: center; color: #2c3e50; }
        table { border-collapse: collapse; width: 500px; margin: auto; background: white; box-shadow: 0 2px 8px rgba(0,0,0,0.2); }
        th, td { padding: 12px; border: 1px solid #ddd; text-align: center; }
        th { background: #2c3e50; color: white; }
        tr:nth-child(even) { background: #f2f2f2; }
        
        /* Hiệu ứng mờ khi đang lưu ngầm */
        .pending { opacity: 0.5; font-style: italic; }

        .form-container { width: 500px; margin: 20px auto; padding: 20px; background: white; box-shadow: 0 2px 8px rgba(0,0,0,0.1); border-radius: 8px; text-align: center; }
        input { padding: 8px; margin: 5px; border: 1px solid #ccc; border-radius: 4px; }
        button { padding: 8px 15px; cursor: pointer; border: none; border-radius: 4px; color: white; transition: 0.3s; }
        .btn-add { background: #27ae60; }
        .btn-edit { background: #2980b9; }
        .btn-delete { background: #c0392b; }
        button:disabled { background: #bdc3c7; cursor: not-allowed; }
    </style>
</head>
<body>

    <h1>Danh sách users</h1>

    <table>
        <thead>
            <tr>
                <th>ID</th>
                <th>Name</th>
            </tr>
        </thead>
        <tbody id="table-body">
            <tr><td colspan="2">Đang kết nối server...</td></tr>
        </tbody>
    </table>

    <div class="form-container">
        <h3>Thao tác dữ liệu</h3>
        <input type="number" id="user-id" placeholder="Nhập ID (để sửa/xóa)">
        <input type="text" id="user-name" placeholder="Nhập tên User">
        <br><br>
        <button id="add-btn" class="btn-add" onclick="addUser()">Thêm mới</button>
        <button id="edit-btn" class="btn-edit" onclick="updateUser()">Sửa (theo ID)</button>
        <button id="del-btn" class="btn-delete" onclick="deleteUser()">Xóa (theo ID)</button>
    </div>

    <script>
        const API_URL = "https://backend-user-lq25.onrender.com/users";

        // 1. Hàm lấy danh sách chính thức từ Server
        function loadUsers() {
            fetch(API_URL)
                .then(res => res.json())
                .then(data => {
                    renderData(data);
                })
                .catch(() => {
                    document.getElementById("table-body").innerHTML = '<tr><td colspan="2">Lỗi tải dữ liệu</td></tr>';
                });
        }

        // Hàm render dữ liệu ra bảng
        function renderData(data) {
            let html = data.length === 0 ? '<tr><td colspan="2">Không có dữ liệu</td></tr>' : 
                data.map(u => `<tr id="row-${u.id}"><td>${u.id}</td><td>${u.name}</td></tr>`).join('');
            document.getElementById("table-body").innerHTML = html;
        }

        // 2. Hàm thêm mới với Optimistic UI
        function addUser() {
            const name = document.getElementById("user-name").value;
            if(!name) return alert("Vui lòng nhập tên!");

            // Tạm thời tạo 1 ID giả để hiển thị ngay
            const tempId = "Updating...";
            const tableBody = document.getElementById("table-body");
            
            // Thêm ngay vào bảng (Optimistic Update)
            const newRow = `<tr id="temp-row" class="pending"><td>${tempId}</td><td>${name}</td></tr>`;
            tableBody.innerHTML += newRow;
            
            clearInput();

            fetch(API_URL, {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ name: name })
            })
            .then(res => {
                if(res.ok) loadUsers(); // Sau khi server xong thì cập nhật lại ID thật
            });
        }

        // 3. Hàm sửa với hiệu ứng phản hồi nhanh
       // 3. Hàm sửa đã được tối ưu
function updateUser() {
    const id = document.getElementById("user-id").value;
    const name = document.getElementById("user-name").value;
    
    if(!id || !name) return alert("Vui lòng nhập đầy đủ ID và Tên mới!");

    // Hiệu ứng phản hồi nhanh trên giao diện
    const row = document.getElementById(`row-${id}`);
    if(row) {
        row.classList.add("pending");
        row.cells[1].innerText = name + " (Đang đồng bộ...)";
    } else {
        return alert("Không tìm thấy người dùng có ID này để sửa!");
    }

    fetch(`${API_URL}/${id}`, {
        method: "PUT",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ name: name })
    })
    .then(res => {
        if(res.ok) {
            alert("Cập nhật thành công!");
            loadUsers(); // Chỉ load lại khi Server đã báo OK
            clearInput();
        } else {
            alert("Lỗi: Không thể cập nhật dữ liệu trên Server!");
            loadUsers(); // Load lại để trả về tên cũ nếu lỗi
        }
    })
    .catch(err => {
        console.error("Lỗi kết nối:", err);
        alert("Mất kết nối với Server!");
    });
}

        // 4. Hàm xóa nhanh
        function deleteUser() {
            const id = document.getElementById("user-id").value;
            if(!id) return alert("Nhập ID cần xóa!");

            if(confirm("Xác nhận xóa?")) {
                // Ẩn dòng đó ngay lập tức
                const row = document.getElementById(`row-${id}`);
                if(row) row.style.display = "none";

                fetch(`${API_URL}/${id}`, { method: "DELETE" })
                .then(() => {
                    loadUsers();
                    clearInput();
                });
            }
        }

        function clearInput() {
            document.getElementById("user-id").value = "";
            document.getElementById("user-name").value = "";
        }

        loadUsers();
    </script>
</body>
</html>

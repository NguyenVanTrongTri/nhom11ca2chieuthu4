<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Từ Vựng - English Learning App</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="../../css/style.css">
    <link rel="stylesheet" href="../../css/vocabulary.css">
</head>
<body>
    <!-- Navbar -->
    <nav class="navbar navbar-expand-lg navbar-dark" style="background: linear-gradient(135deg, #2563eb 0%, #1e40af 100%);">
        <div class="container-fluid">
            <a class="navbar-brand" href="../../index.html">
                <i class="fas fa-book"></i> EnglishLearn
            </a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item">
                        <a class="nav-link active" href="vocabulary.html">Từ Vựng</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="quiz.html">Quiz</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="dashboard.html">Tiến Độ</a>
                    </li>
                    <li class="nav-item dropdown">
                        <a class="nav-link dropdown-toggle" href="#" id="navbarDropdown" role="button" data-bs-toggle="dropdown">
                            <i class="fas fa-user"></i> Tài Khoản
                        </a>
                        <ul class="dropdown-menu" aria-labelledby="navbarDropdown">
                            <li><a class="dropdown-item" href="profile.html">Hồ Sơ Cá Nhân</a></li>
                            <li><a class="dropdown-item" href="../../../frontend-admin/pages/login.html" target="_blank">
                                <i class="fas fa-shield-alt me-1 text-danger"></i> Admin Panel
                            </a></li>
                            <li><hr class="dropdown-divider"></li>
                            <li><a class="dropdown-item" href="../login.html" onclick="logout()">Đăng Xuất</a></li>
                        </ul>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <!-- Main Content -->
    <div class="vocabulary-container">
        <h1 class="section-title"><i class="fas fa-book-open"></i> Từ Vựng</h1>

        <!-- Search Section -->
        <div class="search-section">
            <input type="text" class="search-input" id="searchInput" placeholder="Tìm kiếm từ vựng...">
            <button class="search-btn" onclick="searchVocabulary()">
                <i class="fas fa-search"></i> Tìm Kiếm
            </button>
        </div>

        <!-- Filter Section -->
        <div class="filter-section">
            <div class="filter-title"><i class="fas fa-filter"></i> Lọc Theo Chủ Đề</div>
            <div id="category-chips" class="filter-chips">
                <!-- Chips load động từ API -->
                <div class="chip active" data-category-id="all" onclick="filterByCategory('all', this)">Tất Cả</div>
            </div>
        </div>

        <!-- Vocabulary List - dạng lưới -->
        <div id="vocabularyList" class="row g-3">
    </div>

    <!-- Footer -->
    <footer style="background-color: #1f2937; color: white; padding: 2rem; text-align: center; margin-top: 3rem;">
        <p style="margin: 0;">&copy; 2024 English Learning App. All rights reserved.</p>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="../../js/config.js"></script>
    <script src="../../js/app.js"></script>
    <script src="../../js/vocabulary.js"></script>
</body>
</html>

<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login - English Learning App</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="../css/style.css">
    <link rel="stylesheet" href="../css/auth.css">
    <style>
        .admin-badge {
            display: inline-flex; align-items: center; gap: 0.4rem;
            background: linear-gradient(135deg, #ef4444, #dc2626);
            color: white; padding: 0.3rem 0.9rem;
            border-radius: 20px; font-size: 0.8rem; font-weight: 600;
            margin-bottom: 0.75rem; letter-spacing: 0.5px;
        }
        .auth-card-header p { color: #6b7280; font-size: 0.9rem; }
        .admin-note {
            background: #fef2f2; border: 1px solid #fecaca;
            border-radius: 8px; padding: 0.75rem 1rem;
            color: #991b1b; font-size: 0.85rem; margin-bottom: 1rem;
        }
    </style>
</head>
<body>
    <div class="auth-container">
        <div class="auth-card">
            <div class="auth-card-header" style="text-align:center;">
                <div class="admin-badge">
                    <i class="fas fa-shield-alt"></i> ADMIN ONLY
                </div>
                <h1><i class="fas fa-user-shield"></i> Đăng Nhập Admin</h1>
                <p>Trang quản trị hệ thống English Learning App</p>
            </div>

            <div class="admin-note">
                <i class="fas fa-exclamation-triangle me-1"></i>
                Chỉ tài khoản có quyền <strong>ADMIN</strong> mới được truy cập.
            </div>

            <form class="auth-form" id="loginForm">
                <div class="form-group">
                    <label for="email" class="form-label">Email Admin</label>
                    <input type="email" class="form-control" id="email" placeholder="Nhập email admin" required>
                </div>

                <div class="form-group">
                    <label for="password" class="form-label">Mật Khẩu</label>
                    <input type="password" class="form-control" id="password" placeholder="Nhập mật khẩu" required>
                </div>

                <div class="checkbox-group" style="margin-bottom: 1.5rem;">
                    <input type="checkbox" id="remember">
                    <label for="remember">Nhớ mật khẩu</label>
                </div>

                <button type="submit" class="auth-btn" style="background: linear-gradient(135deg, #ef4444, #dc2626);">
                    <i class="fas fa-sign-in-alt"></i> Đăng Nhập Admin
                </button>
            </form>

            <div class="auth-footer" style="text-align:center; margin-top:1rem;">
                <a href="../../frontend-user/pages/login.html" style="color:#6b7280; font-size:0.85rem;">
                    <i class="fas fa-arrow-left me-1"></i> Quay về trang người dùng
                </a>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="../js/config.js"></script>
    <script src="../js/auth.js"></script>
</body>
</html>

<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Quản lý Users</title>
    <style>
        body { font-family: Arial; background: #f4f6f9; margin: 40px; }
        h1 { text-align: center; }
        table { border-collapse: collapse; width: 500px; margin: auto; background: white; box-shadow: 0 2px 8px rgba(0,0,0,0.2); }
        th, td { padding: 12px; border: 1px solid #ddd; text-align: center; }
        th { background: #2c3e50; color: white; }
        tr:nth-child(even) { background: #f2f2f2; }
        
        /* Form style */
        .form-container { width: 500px; margin: 20px auto; padding: 20px; background: white; box-shadow: 0 2px 8px rgba(0,0,0,0.1); border-radius: 8px; text-align: center; }
        input { padding: 8px; margin: 5px; border: 1px solid #ccc; border-radius: 4px; }
        button { padding: 8px 15px; cursor: pointer; border: none; border-radius: 4px; color: white; transition: 0.3s; }
        .btn-add { background: #27ae60; }
        .btn-edit { background: #2980b9; }
        .btn-delete { background: #c0392b; }
        button:hover { opacity: 0.8; }
    </style>
</head>
<body>

    <h1>Danh sách users</h1>

    <table>
        <thead>
            <tr>
                <th>ID</th>
                <th>Name</th>
            </tr>
        </thead>
        <tbody id="table-body">
            <tr><td colspan="2">Loading dữ liệu...</td></tr>
        </tbody>
    </table>

    <div class="form-container">
        <h3>Thao tác thêm sửa xóa</h3>
        <input type="number" id="user-id" placeholder="Nhập ID (để sửa/xóa)">
        <input type="text" id="user-name" placeholder="Nhập tên User">
        <br><br>
        <button class="btn-add" onclick="addUser()">Thêm mới</button>
        <button class="btn-edit" onclick="updateUser()">Sửa (theo ID)</button>
        <button class="btn-delete" onclick="deleteUser()">Xóa (theo ID)</button>
    </div>

    <script>
        const API_URL = "https://backend-user-lq25.onrender.com/users";

        // 1. Hàm lấy danh sách (Read)
        function loadUsers() {
            fetch(API_URL)
                .then(res => res.json())
                .then(data => {
                    let html = data.length === 0 ? '<tr><td colspan="2">Không có dữ liệu</td></tr>' : 
                        data.map(u => `<tr><td>${u.id}</td><td>${u.name}</td></tr>`).join('');
                    document.getElementById("table-body").innerHTML = html;
                })
                .catch(() => {
                    document.getElementById("table-body").innerHTML = '<tr><td colspan="2">Lỗi tải dữ liệu</td></tr>';
                });
        }

        // 2. Hàm thêm mới (Create)
        function addUser() {
            const name = document.getElementById("user-name").value;
            if(!name) return alert("Vui lòng nhập tên!");

            fetch(API_URL, {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ name: name })
            })
            .then(() => {
                loadUsers(); // Load lại bảng
                clearInput();
            });
        }

        // 3. Hàm sửa (Update)
        function updateUser() {
            const id = document.getElementById("user-id").value;
            const name = document.getElementById("user-name").value;
            if(!id || !name) return alert("Vui lòng nhập cả ID và Tên cần sửa!");

            fetch(`${API_URL}/${id}`, {
                method: "PUT",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ name: name })
            })
            .then(() => {
                loadUsers();
                clearInput();
            });
        }

        // 4. Hàm xóa (Delete)
        function deleteUser() {
            const id = document.getElementById("user-id").value;
            if(!id) return alert("Vui lòng nhập ID cần xóa!");

            if(confirm("Bạn có chắc chắn muốn xóa user này?")) {
                fetch(`${API_URL}/${id}`, { method: "DELETE" })
                .then(() => {
                    loadUsers();
                    clearInput();
                });
            }
        }

        function clearInput() {
            document.getElementById("user-id").value = "";
            document.getElementById("user-name").value = "";
        }

        // Khởi tạo load dữ liệu khi mở trang
        loadUsers();
    </script>
</body>
</html>
